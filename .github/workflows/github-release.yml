name: Release to GitHub
on:
  push:
    branches: ["main"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          persist-credentials: false
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90
        id: semantic
        with:
          branches: |
            [
              'main'
            ]
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      - name: Output new release version
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          echo "${STEPS_SEMANTIC_OUTPUTS_NEW_RELEASE_VERSION}"
        env:
          STEPS_SEMANTIC_OUTPUTS_NEW_RELEASE_VERSION: "${{ steps.semantic.outputs.new_release_version }}"
