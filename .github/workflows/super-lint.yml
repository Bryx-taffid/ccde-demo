# Formats and lints the source code

name: Linting and formatting

on: # yamllint disable-line rule:truthy
  pull_request: 
    branches: [ "main" ]

permissions: {}

jobs:
  lint:
    name: Super Lint
    runs-on: ubuntu-latest

    permissions:
      # contents permission to clone the repository and to write commits
      contents: write
      packages: read
      # To issues and pull-requests permissions to write results as pull
      # request comments. Omit them if you don't need summary comments
      issues: write
      pull-requests: write
      # To report GitHub Actions status checks. Omit if you don't need
      # to update commit status
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # super-linter needs the full git history to get the
          # list of files that changed across commits
          fetch-depth: 0
          token: ${{ secrets.AUTO_COMMIT_TOKEN }}
          persist-credentials: true

      - name: Super-linter
        uses: super-linter/super-linter@d5b0a2ab116623730dd094f15ddc1b6b25bf7b99
        env:
          # To report GitHub Actions status checks
          GITHUB_TOKEN: ${{ secrets.AUTO_COMMIT_TOKEN }}
          # Disable unwanted formatter/linter
          VALIDATE_BIOME_FORMAT: false
          VALIDATE_BIOME_LINT: false
          VALIDATE_CHECKOV: false
          VALIDATE_JSCPD: false
          # Disable checking in unwanted / preconfigured directories
          IGNORE_GENERATED_FILES: true
          FILTER_REGEX_EXCLUDE: (^|.*/)(Shared)(/.*)?$|(^|.*/)(lib)(/.*)?$|(^|.*/)\.idea(/.*)?$|(^|.*/)_([^/]+)$ # exclude all folders with names Shared, .idea or lib as well as files starting with _
          # auto-fix the following checkers
          FIX_YAML_PRETTIER: true
          FIX_NATURAL_LANGUAGE: true
          FIX_MARKDOWN_PRETTIER: true
          FIX_JSON_PRETTIER: true
          FIX_JAVASCRIPT_PRETTIER: true
          FIX_JAVASCRIPT_ES: true
          FIX_GITHUB_ACTIONS_ZIZMOR: true
          FIX_CSS_PRETTIER: true
          FIX_CSS: true
          FIX_CSHARP: true
      - name: auto commit
        if: >
          github.event_name == 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9
        with:
          branch: ${{ github.event.pull_request.head.ref || github.head_ref || github.ref }}
          commit_message: "chore: fix linting issues"
          commit_user_name: super-linter
          commit_user_email: super-linter@super-linter.dev
        env:
          GITHUB_TOKEN: ${{ secrets.AUTO_COMMIT_TOKEN }}

        
